tl_update_dialog:
  title: "Bản cập nhật mới"
  content: "Đã có bản cập nhật bản dịch mới (%{size}). Bạn có muốn tải về không?"
  content_zip_warning: "Đã có bản cập nhật dịch thuật mới (%{changed_size}). Bản cập nhật này sẽ tải về toàn bộ tệp lưu trữ (%{download_size}) thay thế."

update_prompt_dialog:
  title: "Bản cập nhật mới"
  content: |
    Đã có phiên bản Hachimi mới (%{version}). Bạn có muốn cài đặt không?
    Game sẽ được khởi động lại để áp dụng bản cập nhật.
  android_content: |
    Đã có bản cập nhật Hachimi Edge mới (%{version}). Bạn có muốn cài đặt không?

    Nhấn "Có" để mở UmaPatcher Edge và patch lại game hiện tại của bạn.
    (Không cần tải lại toàn bộ game hay APK, bạn chỉ cần patch lại như bình thường vì UmaPatcher Edge luôn tự tải về phiên bản Hachimi Edge mới nhất.)

updating_dialog:
  title: "Đang cập nhật"
  content: "Đang tải về bản cập nhật, game sẽ được khởi động lại trong giây lát..."

steam_overlay_conflict_dialog:
  title: "Thông báo"
  content: >-
    Các giao dịch mua có thể không hoạt động khi overlay Hachimi được bật. Nếu overlay Steam đã hiện lên
    để bạn thực hiện giao dịch, hãy bỏ qua thông báo này và nhấn Không. Nếu không hoạt động, nhấn Có
    để tạm thời tắt overlay Hachimi. Game sẽ đóng lại, và lần khởi động tiếp theo overlay Hachimi sẽ bị
    tắt để bạn có thể thực hiện giao dịch. Sau đó, bạn có thể khởi động lại game để bật lại overlay.

