tl_update_dialog:
  title: "有可用的更新"
  content: "有可用的更新 (%{size})，是否要下載？"
  content_zip_warning: "有新的翻譯更新可用（%{changed_size}）。此更新將改為下載完整的封存檔（%{download_size}）。"

update_prompt_dialog:
  title: "有可用的更新"
  content: |
    目前有可用的更新 (%{version})，是否要安裝？
    遊戲將重新啟動以套用更新內容。
  android_content: |
    檢測到 Hachimi Edge 的新版本 (%{version})。是否更新？

    點擊「是」將跳轉至 UmaPatcher Edge，在其中重新為當前遊戲補丁以更新 Hachimi。
    (無需重新下載完整遊戲文件或 APK，重新為當前遊戲版本的 APK 補丁並安裝即可，UmaPatcher Edge 將自動下載最新版本的 Hachimi Edge。)

updating_dialog:
  title: "更新中"
  content: "正在下載更新，遊戲將會在稍後重啟…"

steam_overlay_conflict_dialog:
  title: "注意"
  content: >-
    啟用 Hachimi GUI 時，遊戲內購功能可能無法正常運作。
    如果 Steam 覆蓋層已正常顯示且您可以進行購買，請忽略此訊息並按「否」。
    如果無法進行購買，請按「是」以暫時停用 Hachimi GUI 並關閉遊戲。
    下次啟動遊戲時，Hachimi GUI 將被停用，此時您可以正常進行購買。
    購買完成後，請重新啟動遊戲以重新啟用 Hachimi GUI。
