name: Test Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'README-zh_cn.md'
      - 'README-zh_tw.md'
      - 'BUILDING.md'
      - 'BUILDING-zh_cn.md'
      - 'BUILDING-zh_tw.md'
      - '.gitignore'
      - 'rustfmt.toml'
      - '.github/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[ci skip]')"
    steps:
      - uses: actions/checkout@v6
      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2

      - name: Grant execute permission to build script
        run: chmod +x tools/android/build.sh
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Hachimi for Android
        run: |
          rustup target add aarch64-linux-android
          RELEASE=1 ./tools/android/build.sh
        env:
          HACHIMI_IGNORE_DIRTY: "false"

      - name: Attest Android
        uses: actions/attest@v4
        with:
          subject-path: |
            build/*.so
            build/sha256.json

      - name: Upload Android binaries
        uses: actions/upload-artifact@v7
        with:
          name: android-test
          path: |
            build/*.so
            build/sha256.json
          
  build-windows:
    runs-on: windows-latest
    if: "!contains(github.event.head_commit.message, '[ci skip]')"
    steps:
      - uses: actions/checkout@v6
      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2


      - uses: dtolnay/rust-toolchain@stable
      - name: Build Hachimi for Windows
        run: |
          cargo build --target x86_64-pc-windows-msvc --target-dir build --release
          move build\x86_64-pc-windows-msvc\release\hachimi.dll build
        env:
          HACHIMI_IGNORE_DIRTY: "false"

      - name: Build Cellar
        run: |
          git clone --depth 1 --revision d4c3f79801c8131e26df585766c35e5ce11ec57f https://github.com/Hachimi-Hachimi/Cellar
          cd Cellar
          cargo build --target x86_64-pc-windows-msvc --target-dir build --release
          move build\x86_64-pc-windows-msvc\release\cellar.dll build
          cd ..

      - name: Check out FunnyHoney
        run: git clone --depth 1 --revision 418b5348bd9b7376cc7485c591ca69d49aa4d805 https://codeberg.org/LeadRDRK/FunnyHoney.git

      - name: Build Installer
        run: |
          git clone --depth 1 --revision b236ce341477890be1ee759bed8fd27c45862d7f https://github.com/teiosteppa/Installer
          copy build\hachimi.dll Installer
          move Cellar\build\cellar.dll Installer
          move FunnyHoney\FunnyHoney.exe Installer
          cd Installer
          cargo build --target x86_64-pc-windows-msvc --target-dir build --release --features compress_bin
          cd ..
          move Installer\build\x86_64-pc-windows-msvc\release\hachimi_installer.exe build

      - name: Get checksums for Windows binaries
        shell: bash
        run: |
          curl -L "https://github.com/BLAKE3-team/BLAKE3/releases/latest/download/b3sum_windows_x64_bin.exe" -o b3sum.exe
          DLL_HASH=($(./b3sum.exe build/hachimi.dll | tr -d '\r'))
          EXE_HASH=($(./b3sum.exe build/hachimi_installer.exe | tr -d '\r'))
          cat <<EOF > build/blake3.json
          {
            "hachimi.dll": "$DLL_HASH",
            "hachimi_installer.exe": "$EXE_HASH"
          }
          EOF
      
      - name: Attest Windows
        uses: actions/attest@v4
        with:
          subject-path: |
            build/blake3.json
            build/hachimi.dll
            build/hachimi_installer.exe

      - name: Upload Windows binaries
        uses: actions/upload-artifact@v7
        with:
          name: windows-test
          path: |
            build/blake3.json
            build/hachimi.dll
            build/hachimi_installer.exe
